name: CI

on:
  push:
    branches: [main]

jobs:

  lint-job:
    runs-on: ubuntu-latest


    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ml-ci-demo .

      - name: Run linter (syntax test)
        run: docker run ml-ci-demo ruff check .


  test-forward-pass-job:
    runs-on: ubuntu-latest
    needs: lint-job

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ml-ci-demo .

      - name: Run pytest
        run: docker run -v $(pwd)/tests:/app/tests -v $(pwd)/conftest.py:/app/conftest.py ml-ci-demo pytest tests/